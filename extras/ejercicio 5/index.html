<!-- Ejercicio 5 (cambiar color de fondo con 3 barras de rangos)
El label tiene mas sentido cuando se usa el intput type="text" ya que al hacer click en la etiqueta es como si hicieras click dentro del  input, osea si haces click en la etiqueta nombre, se hace foco en el input nombre.

En un html insertar 3 barras de rangos:
<input type="range" value="0" min="0" max="255" step="1">

una para el color rojo, otra para el color verde y la ultima para el azul, y que cuando se muevan las barras cambie el color de fondo
Dar un estilo atractivo y utilizar el complemento del color (255 - color) para cambiear el fondo del contenedor de los inputs-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ejercicio 5</h1>
    <div id="container" style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: rgb(255, 255, 255);">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <label for="red">Rojo</label>
            <input type="range" id="red" value="0" min="0" max="255" step="1">
            <label for="green">Verde</label>
            <input type="range" id="green" value="0" min="0" max="255" step="1">
            <label for="blue">Azul</label>
            <input type="range" id="blue" value="0" min="0" max="255" step="1">
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const redInput = document.getElementById('red');
        const greenInput = document.getElementById('green');
        const blueInput = document.getElementById('blue');

        function updateBackgroundColor() {
            const red = parseInt(redInput.value);
            const green = parseInt(greenInput.value);
            const blue = parseInt(blueInput.value);
            container.style.backgroundColor = `rgb(${255 - red}, ${255 - green}, ${255 - blue})`;
        }

        redInput.addEventListener('input', updateBackgroundColor);
        greenInput.addEventListener('input', updateBackgroundColor);
        blueInput.addEventListener('input', updateBackgroundColor);
    </script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        label {
            font-size: 18px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 300px;
        }
</body>
</html>
