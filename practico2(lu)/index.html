<!DOCTYPE html>

<body>

    <!-- puse los parrafos -->

    <!-- y el contenedor con los tres li -->
    <div id="contenedor">
        <ul>
            <li></li>

    <!-- Ejercicio 2------------------------------------------------------------------- -->

    <input type="text" placeholder="añade a alguien al grupo!" id="miInput">
    <button class="agregar">Agregar</button>
